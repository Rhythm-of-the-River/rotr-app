steps:
  # Install dependencies and build the static site with Vite.
  - name: node:20
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        npm ci
        npm run build

  # Install + build Cloud Functions (TypeScript).
  - name: node:20
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        cd functions
        npm ci
        npm run build

  # Deploy hosting + firestore + functions to Firebase using a freshly-installed
  # firebase-tools (the `firebase-cli:latest` image has a minimatch regression).
  - name: node:20
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        npm install -g firebase-tools@latest
        firebase deploy \
          --project=$PROJECT_ID \
          --only=hosting,firestore,functions \
          --non-interactive

options:
  logging: CLOUD_LOGGING_ONLY

tags:
  - rotr-app
  - firebase-hosting
